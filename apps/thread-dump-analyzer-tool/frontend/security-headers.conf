# Shared browser security headers, included at both server level and the /config.js location.
# nginx replaces (never merges) inherited add_header in any block that sets its own, hence the duplication.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# style-src needs 'unsafe-inline' for MUI/emotion runtime styles.
# connect-src/frame-src stay scheme-broad because the backend API and Asgardeo origins are runtime-injected; tighten per deployment.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https: http:; frame-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https:; object-src 'none'" always;

# Honored only over HTTPS; browsers ignore it on plain-HTTP local runs.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
