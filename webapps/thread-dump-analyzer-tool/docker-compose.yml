# Values come from a sibling .env file (copy .env.example). See the README "Run with Docker" section.
services:
  backend:
    build:
      context: ./backend
    image: tdat-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # AI insights key; jobs still complete with insights omitted when blank.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Derives JWKS and issuer for Bearer-JWT validation. Required unless AUTH_ENABLED=false.
      ASGARDEO_BASE_URL: ${ASGARDEO_BASE_URL:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      # Must list the exact browser origin the SPA is served from; override for non-local hosts.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: tdat-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:8080"
    environment:
      # Browser-facing backend URL, injected into config.js at start; override for non-local hosts.
      API_URL: ${API_URL:-http://localhost:8080}
      ASGARDEO_CLIENT_ID: ${ASGARDEO_CLIENT_ID:-}
      ASGARDEO_BASE_URL: ${ASGARDEO_BASE_URL:-}
    depends_on:
      - backend
    restart: unless-stopped