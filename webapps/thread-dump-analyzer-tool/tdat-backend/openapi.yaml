openapi: 3.0.3
info:
  title: TDAT Backend API
  description: API for the Thread Dump Analyzer Tool (TDAT) to analyze WSO2/Java thread dumps asynchronously.
  version: 1.0.0
servers:
  - url: /
paths:
  /health:
    get:
      summary: Liveness Probe
      description: Returns 200 OK to indicate the server is running.
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /api/v1/analyze/jobs:
    post:
      summary: Upload thread dumps and start analysis
      description: Accepts multipart/form-data containing thread dump files and optional CPU usage files. Starts an async job.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - thread_dumps
              properties:
                thread_dumps:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more Java thread dump text files
                thread_usages:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Matching CPU usage files
      responses:
        '202':
          description: Job accepted and queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                    example: "123e4567-e89b-12d3-a456-426614174000"

  /api/v1/analyze/jobs/{id}:
    get:
      summary: Get Job Status
      description: Poll for job status and retrieve the final analysis result.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The UUID of the job
      responses:
        '200':
          description: Job status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: [pending, running, completed, failed]
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                  result:
                    type: object
                    description: Populated only when status is completed
                  error:
                    type: string
                    description: Populated only when status is failed
        '404':
          description: Job ID not found