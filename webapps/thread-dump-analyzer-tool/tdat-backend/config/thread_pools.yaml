# Threadpools categorization and configuration of Thread Dumps

pools:
  # Disruptor Based Flusher Threadpool
  - name: "DisruptorBasedFlusher"
    patterns:
      - "^DisruptorBasedFlusher-\\d+$"
    description: "A specialized, extremely fast thread used for flushing events to disk or external systems without slowing down the main application."
    expected_behavior: "Mostly WAITING for a batch of events to arrive, followed by short bursts of RUNNABLE activity to flush the data."

  # http-nio- Threadpool
  - name: "Tomcat HTTP Threads"
    patterns:
      - "^http-nio-\\d+-exec-\\d+$"
    description: "Worker threads that process incoming standard (unencrypted) HTTP web requests."
    expected_behavior: "Usually WAITING for a new request to arrive. When active, they switch to RUNNABLE to process the API call or web traffic."

  # https-jsse-nio- Threadpool
  - name: "Tomcat HTTPS Threads"
    patterns:
      - "^https-jsse-nio-\\d+-exec-\\d+$"
    description: "Worker threads that process secure, encrypted (SSL/TLS) incoming HTTPS requests."
    expected_behavior: "Similar to standard HTTP threads, mostly WAITING when idle, and RUNNABLE when decrypting and handling secure traffic."

  # Worker Threads Threadpool
  - name: "Worker Threads"
    patterns:
      - "^pool-\\d+-thread-\\d+$"
    description: "A generic pool of threads used by the application to execute various asynchronous background tasks."
    expected_behavior: "WAITING on a task queue when idle. Behavior varies greatly when active, depending on the specific background task assigned to them."

  # JobPoolThread Threadpool
  - name: "JobPool Threads"
    patterns:
      - "^JobPoolThread-\\d+$"
    description: "Threads dedicated to executing scheduled internal jobs or queued batch processes."
    expected_behavior: "Usually WAITING or TIMED_WAITING until their specific job is triggered to run."

  # CacheExpiryScheduler Threadpool
  - name: "CacheExpiryScheduler"
    patterns:
      - "^CacheExpirySchedulerThread-\\d+$"
    description: "A maintenance thread that periodically wakes up to scan and delete expired temporary data from the application's memory (cache)."
    expected_behavior: "Spends most of its time TIMED_WAITING (sleeping). Wakes up briefly as RUNNABLE to perform cache cleanup."

  # DisruptorInboundEvent Threadpool
  - name: "DisruptorInboundEvent"
    patterns:
      - "^DisruptorInboundEventThread-\\d+$"
    description: "High-speed threads that consume incoming network events sequentially using a highly optimized ring-buffer queue."
    expected_behavior: "WAITING when the event queue is empty, and rapidly switching to RUNNABLE during high-throughput traffic spikes."

  # Mina Network Transport Threadpool
  - name: "Mina Network Transport"
    patterns:
      - "^MinaNetworkTransport\\(Acceptor\\)-\\d+$"
      - "^MinaNetworkTransport\\(Client\\)-\\d+$"
    description: "Low-level Apache MINA network threads used for handling asynchronous TCP/UDP network connections."
    expected_behavior: "Usually RUNNABLE inside a network polling loop, accepting client connections or reading byte streams."

  # PassThroughMessageProcessor Threadpool
  - name: "PassThroughMessageProcessor Threads"
    patterns:
      - "^PassThroughMessageProcessor-\\d+$"
    description: "High-performance mediation threads (often in WSO2). They route and process incoming API messages quickly without fully loading the message into memory."
    expected_behavior: "WAITING when idle. When active, they are RUNNABLE but might show as BLOCKED or WAITING if the downstream backend is slow to respond."

  # SynapseWorker Threadpool
  - name: "SynapseWorker Threads"
    patterns:
      - "^SynapseWorker-\\d+$"
    description: "Heavy-lifting threads that execute complex message transformations, routing, and mediation logic within the system."
    expected_behavior: "Mostly WAITING in a pool. If a payload requires complex transformation (like XML to JSON), they will be heavily RUNNABLE."

  # DisruptorInboundEvent Threadpool
  - name: "DisruptorInboundEvent Threads"
    patterns:
      - "^DisruptorInboundEventThread-\\d+$"
    description: "High-speed threads that consume incoming network events sequentially using a highly optimized ring-buffer queue."
    expected_behavior: "WAITING when the event queue is empty, and rapidly switching to RUNNABLE during high-throughput traffic spikes."

  # DataBridge Core pool Threadpool
  - name: "DataBridge Core Threads"
    patterns:
      - "^DataBridge-Core-pool-\\d+-thread-\\d+$"
    description: "The main processing threads for ingesting high volumes of analytics, tracing, or logging events from external sources."
    expected_behavior: "WAITING for data batches, becoming RUNNABLE when processing incoming analytics streams."

  # DataBridge Receiver Binary SSL Threadpool
  - name: "DataBridge Receiver Binary (SSL Threads)"
    patterns:
      - "^DataBridge-Receiver-Binary-SSL-pool-\\d+-thread-\\d+$"
    description: "Dedicated network listener threads that specifically receive compressed binary analytics data over secure SSL connections."
    expected_behavior: "Often RUNNABLE polling for incoming data, or WAITING on the network socket if no analytics nodes are sending data."

  # DataBridge Receiver Binary TCP Threadpool
  - name: "DataBridge Receiver Binary (TCP Threads)"
    patterns:
      - "^DataBridge-Receiver-Binary-TCP-pool-\\d+-thread-\\d+$"
    description: "Dedicated network listener threads that specifically receive compressed binary analytics data over TCP connections."
    expected_behavior: "Often RUNNABLE polling for incoming data, or WAITING on the network socket if no analytics nodes are sending data."

  # HTTP-Listener I/O Dispatcher Threadpool
  - name: "HTTP-Listener I/O Dispatcher Threads"
    patterns:
      - "^HTTP-Listener I/O dispatcher-\\d+$"
    description: "Fast, non-blocking threads that listen for incoming network connections and hand them off to worker threads."
    expected_behavior: "You will almost always see these in a RUNNABLE state, constantly polling the network for new incoming connections."

  # HTTPS-Listener I/O Dispatcher Threadpool
  - name: "HTTPS-Listener I/O Dispatcher Threads"
    patterns:
      - "^HTTPS-Listener I/O dispatcher-\\d+$"
    description: "Fast, non-blocking threads that listen for incoming secure HTTPS network connections."
    expected_behavior: "You will almost always see these in a RUNNABLE state, constantly polling the network for new incoming connections."

  # HTTP-Sender I/O Dispatcher Threadpool
  - name: "HTTP-Sender I/O Dispatcher Threads"
    patterns:
      - "^HTTP-Sender I/O dispatcher-\\d+$"
    description: "Fast, non-blocking threads responsible for sending out data and receiving responses from external backend services."
    expected_behavior: "Constantly RUNNABLE as they monitor outbound network sockets for incoming responses from external servers."

  # HTTPS-Sender I/O Dispatcher Threadpool
  - name: "HTTPS-Sender I/O Dispatcher Threads"
    patterns:
      - "^HTTPS-Sender I/O dispatcher-\\d+$"
    description: "Fast, non-blocking threads responsible for sending secure data and receiving responses from external services."
    expected_behavior: "Constantly RUNNABLE as they monitor outbound network sockets for incoming responses from external servers."

  # RabbitMQ Worker Threadpool
  - name: "RabbitMQ Worker Threads"
    patterns:
      - "^rabbitmq-Worker-\\d+$"
    description: "Consumer threads that process asynchronous messages delivered from a RabbitMQ queue."
    expected_behavior: "WAITING when the queue is empty. RUNNABLE when actively pulling and processing a message from the broker."

  # AMQP Connection Threadpool
  - name: "AMQP Connection Threads"
    patterns:
      - "^AMQP Connection \\d+.\\d+.\\d+.\\d+:\\d+$"
    description: "Background threads that maintain the active network connection and send heartbeats to the RabbitMQ broker to keep the connection alive."
    expected_behavior: "Frequently TIMED_WAITING between heartbeats, waking up briefly as RUNNABLE to ping the broker over the network."

  # Timer Threadpool
  - name: "Timer Threads"
    patterns:
      - "^Timer-\\d+$"
    description: "Standard background timer threads used to delay tasks or run simple tasks at fixed intervals."
    expected_behavior: "Almost always TIMED_WAITING (sleeping) until the clock hits the scheduled time for their assigned task."